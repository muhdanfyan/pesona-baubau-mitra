<!-- Bottom Navigation (Hides on this focused task page, but included as per shell logic guidance if top-level, currently suppressed for task focus) -->
<script>
        // Micro-interaction for GPS Toggle
        const gpsBtn = document.getElementById('gps-toggle');
        const knob = document.getElementById('toggle-knob');
        let isGpsActive = false;

        gpsBtn.addEventListener('click', () => {
            isGpsActive = !isGpsActive;
            if (isGpsActive) {
                gpsBtn.classList.replace('bg-surface-container-highest', 'bg-secondary');
                knob.classList.replace('left-1', 'left-7');
            } else {
                gpsBtn.classList.replace('bg-secondary', 'bg-surface-container-highest');
                knob.classList.replace('left-7', 'left-1');
            }
        });

        // Textarea counter
        const textarea = document.getElementById('update_desc');
        const counter = textarea.nextElementSibling.querySelector('span');
        textarea.addEventListener('input', (e) => {
            const length = e.target.value.length;
            counter.textContent = `${length}/500`;
            if (length > 450) {
                counter.classList.replace('text-outline', 'text-error');
            } else {
                counter.classList.replace('text-error', 'text-outline');
            }
        });

        // Simple feedback on button click
        const sendBtn = document.querySelector('button.bg-primary');
        sendBtn.addEventListener('click', () => {
            const originalContent = sendBtn.innerHTML;
            sendBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> <span>Mengirim...</span>`;
            sendBtn.classList.add('opacity-80', 'cursor-wait');
            
            setTimeout(() => {
                sendBtn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> <span>Terkirim!</span>`;
                sendBtn.classList.replace('bg-primary', 'bg-secondary');
                
                setTimeout(() => {
                    sendBtn.innerHTML = originalContent;
                    sendBtn.classList.replace('bg-secondary', 'bg-primary');
                    sendBtn.classList.remove('opacity-80', 'cursor-wait');
                }, 2000);
            }, 1500);
        });
    </script>

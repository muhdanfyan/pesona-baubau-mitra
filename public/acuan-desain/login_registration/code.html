<body class="flex flex-col items-center justify-start py-10 px-4">
<!-- Header / Logo Section -->
<header class="mb-8 text-center animate-fade-in">
<div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full mb-4 shadow-lg">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="anchor">anchor</span>
</div>
<h1 class="font-h1 text-h1 text-white tracking-tight">Pesona Baubau Mitra</h1>
<p class="font-body text-white/80 mt-2">Pusat Digitalisasi Ekosistem Pariwisata</p>
</header>
<!-- Main Container -->
<main class="w-full max-w-md glass-card rounded-[24px] shadow-2xl overflow-hidden transition-all duration-500">
<!-- Tab Navigation -->
<nav class="flex border-b border-outline-variant/30">
<button class="flex-1 py-4 font-h4 text-h4 transition-all duration-300 border-b-2 border-primary text-primary" id="btn-masuk" onclick="switchTab('masuk')">
                Masuk
            </button>
<button class="flex-1 py-4 font-h4 text-h4 transition-all duration-300 border-b-2 border-transparent text-on-surface-variant" id="btn-daftar" onclick="switchTab('daftar')">
                Daftar
            </button>
</nav>
<!-- Form Canvas -->
<div class="p-6">
<!-- Login Form -->
<form class="space-y-4" id="form-masuk">
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1">Email Mitra</label>
<input class="w-full h-[48px] px-4 rounded-xl border border-outline-variant/30 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="nama@email.com" type="email"/>
</div>
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1">Kata Sandi</label>
<input class="w-full h-[48px] px-4 rounded-xl border border-outline-variant/30 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
<div class="flex justify-end">
<a class="font-label text-label text-primary hover:underline" href="#">Lupa kata sandi?</a>
</div>
<button class="w-full h-[48px] bg-primary text-white rounded-xl font-button text-button shadow-md hover:opacity-90 active:scale-95 transition-all" type="submit">
                    Masuk ke Dashboard
                </button>
</form>
<!-- Registration Form (Hidden by default) -->
<form class="hidden space-y-4" id="form-daftar">
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1">Nama Lengkap</label>
<input class="w-full h-[48px] px-4 rounded-xl border border-outline-variant/30 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="Masukkan nama sesuai KTP" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1">Email</label>
<input class="w-full h-[48px] px-4 rounded-xl border border-outline-variant/30 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="nama@email.com" type="email"/>
</div>
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1">WhatsApp</label>
<input class="w-full h-[48px] px-4 rounded-xl border border-outline-variant/30 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="0812..." type="tel"/>
</div>
</div>
<!-- Partner Type Selection -->
<div class="space-y-2">
<label class="font-label text-label text-on-surface-variant ml-1">Jenis Kemitraan</label>
<div class="grid grid-cols-3 gap-2">
<div class="partner-option cursor-pointer flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant/30 bg-white hover:bg-surface-container-low transition-all" onclick="selectPartner(this)">
<span class="text-2xl mb-1">🏪</span>
<span class="font-label text-label text-[10px] text-center leading-tight">UMKM</span>
</div>
<div class="partner-option cursor-pointer flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant/30 bg-white hover:bg-surface-container-low transition-all" onclick="selectPartner(this)">
<span class="text-2xl mb-1">🏨</span>
<span class="font-label text-label text-[10px] text-center leading-tight">Hotel/Homestay</span>
</div>
<div class="partner-option cursor-pointer flex flex-col items-center justify-center p-3 rounded-xl border border-outline-variant/30 bg-white hover:bg-surface-container-low transition-all" onclick="selectPartner(this)">
<span class="text-2xl mb-1">👥</span>
<span class="font-label text-label text-[10px] text-center leading-tight">Pokdarwis</span>
</div>
</div>
</div>
<div class="space-y-1">
<label class="font-label text-label text-on-surface-variant ml-1">Kata Sandi</label>
<input class="w-full h-[48px] px-4 rounded-xl border border-outline-variant/30 bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="Minimal 8 karakter" type="password"/>
</div>
<div class="flex items-start gap-2 py-2">
<input class="mt-1 rounded text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="font-label text-label text-on-surface-variant" for="terms">Saya menyetujui syarat dan ketentuan kemitraan Pesona Baubau Digital Hub.</label>
</div>
<button class="w-full h-[48px] bg-secondary text-white rounded-xl font-button text-button shadow-md hover:opacity-90 active:scale-95 transition-all" type="submit">
                    Daftar Sekarang
                </button>
</form>
</div>

<footer class="mt-8 text-center">
<p class="font-label text-label text-white/60">© 2024 Dinas Pariwisata Kota Baubau. Seluruh Hak Cipta Dilindungi.</p>
</footer>
<script>
        function switchTab(tab) {
            const btnMasuk = document.getElementById('btn-masuk');
            const btnDaftar = document.getElementById('btn-daftar');
            const formMasuk = document.getElementById('form-masuk');
            const formDaftar = document.getElementById('form-daftar');

            if (tab === 'masuk') {
                btnMasuk.classList.add('border-primary', 'text-primary');
                btnMasuk.classList.remove('border-transparent', 'text-on-surface-variant');
                btnDaftar.classList.add('border-transparent', 'text-on-surface-variant');
                btnDaftar.classList.remove('border-primary', 'text-primary');
                formMasuk.classList.remove('hidden');
                formDaftar.classList.add('hidden');
            } else {
                btnDaftar.classList.add('border-primary', 'text-primary');
                btnDaftar.classList.remove('border-transparent', 'text-on-surface-variant');
                btnMasuk.classList.add('border-transparent', 'text-on-surface-variant');
                btnMasuk.classList.remove('border-primary', 'text-primary');
                formDaftar.classList.remove('hidden');
                formMasuk.classList.add('hidden');
            }
        }

        function selectPartner(element) {
            document.querySelectorAll('.partner-option').forEach(opt => {
                opt.classList.remove('partner-card-active', 'ring-2', 'ring-primary/20');
                opt.classList.add('border-outline-variant/30');
            });
            element.classList.add('partner-card-active', 'ring-2', 'ring-primary/20');
            element.classList.remove('border-outline-variant/30');
        }

        // Simple enter animation
        document.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.style.transition = 'opacity 0.8s ease-out';
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>
</body></html>
